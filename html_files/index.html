<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2933;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            gap: 12px;
            height: 100vh;
            padding: 12px;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
        }

        .panel-title {
            margin: 0;
            padding: 10px 12px;
            font-size: 16px;
            border-bottom: 1px solid #d9e2ec;
            background: #eef2f7;
        }

        iframe {
            width: 100%;
            height: calc(100% - 44px);
            border: 0;
            display: block;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="layout">
        <section class="panel">
            <h2 class="panel-title">Forms</h2>
            <iframe src="/app/form.html" title="Forms"></iframe>
        </section>
        <section class="panel">
            <h2 class="panel-title">Computational Graph</h2>
            <iframe name="graphFrame" src="/app/temp.html" title="Graph view"></iframe>
        </section>
        <section class="panel">
            <h2 class="panel-title">Topic Values</h2>
            <iframe name="tableFrame" src="/app/temp.html" title="Topic values"></iframe>
        </section>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #1f2933;
        }

        .form-card {
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            background: #f8fafc;
        }

        h1, h2 {
            margin-top: 0;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            margin-bottom: 12px;
        }

        button {
            padding: 8px 14px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <h1>Controls</h1>

    <section class="form-card">
        <h2>Upload Configuration</h2>
        <form method="post" action="http://localhost:8080/upload" target="graphFrame" enctype="multipart/form-data">
            <label for="config">Configuration file</label>
            <input id="config" type="file" name="config" required>
            <button type="submit">deploy</button>
        </form>
        <form method="get" action="http://localhost:8080/refresh" target="graphFrame">
            <button type="submit">refresh graph</button>
        </form>
    </section>

    <section class="form-card">
        <h2>Publish Message</h2>
        <form method="get" action="http://localhost:8080/publish" target="tableFrame">
            <label for="topic">Topic</label>
            <input id="topic" type="text" name="topic" required>

            <label for="message">Message</label>
            <input id="message" type="text" name="message" required>

            <button type="submit">send</button>
        </form>
    </section>
</body>
</html>
